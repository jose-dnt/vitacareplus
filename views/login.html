<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCare+</title>

    <style>
        h2 {
            text-align: center;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        #error-message {
            color: #d9534f;
            background: #f2dede;
            border: 1px solid #ebccd1;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
        }

        button {
            width: 48%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        .register-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            background: black;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        .register-link:hover {
            background: #333;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Login</h2>

        <div id="error-message">Email ou senha incorretos.</div>

        <form action="/login" method="POST">
            <label>Email</label>
            <input type="email" name="email" required>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <div class="button-container">
                <button type="submit">Entrar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>

        <a href="/register" class="register-link">Cadastrar</a>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('erro') === 'true') {
            document.getElementById('error-message').style.display = 'block';
        }
    </script>

</body>

</html>
