<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VitaCare+</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/principal.css">
    <link rel="stylesheet" href="/css/profissionais.css">
    <link rel="icon" type="image/png" href="/images/logoFavicon.png">
</head>

<body>

    <div class="layout">

        <!-- MENU LATERAL -->
        <aside class="menu">
            <h1 class="logo">
                Vita<span>Care</span><small>+</small>
            </h1>

            <nav>
                <ul>
                    <li class="py-2"><a href="/principal" class="hover:text-yellow-500">Dashboard</a></li>
                    <li class="py-2"><a href="/pacientes" class="hover:text-yellow-500">Pacientes</a></li>
                    <li class="py-2"><a href="/profissionais" class="hover:text-yellow-500">Profissionais</a></li>
                    <li class="py-2"><a href="/consultas" class="hover:text-yellow-500">Consultas</a></li>
                    <li class="py-2"><a href="/logout" class="hover:text-red-400">Sair</a></li>
                </ul>
            </nav>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="conteudo">

            <h2 class="titulo-pagina">
                Profissionais Cadastrados
            </h2>

            <div class="topo-tabela">
                <button id="btnNovoProfissional" class="btn-adicionar">
                    + Novo Profissional
                </button>
            </div>

            <!-- TABELA -->
            <div class="tabela-profissionais">

                <table id="tabelaProfissionais" class="display">

                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CRM</th>
                            <th>Especialidade</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody>
                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <!-- Modal -->
    <div id="modalProfissional" class="modal">
        <div class="modal-content">

            <span class="fechar">&times;</span>

            <h3 id="modalTitulo">Novo Profissional</h3>

            <form id="formProfissional">

                <input type="hidden" id="id">

                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="campo">
                    <label for="crm">CRM</label>
                    <input type="text" id="crm" required>
                </div>

                <div class="campo">
                    <label for="especialidade">Especialidade</label>
                    <input type="text" id="especialidade" required>
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" required>
                </div>

                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <button type="submit" class="btn-salvar">
                    Salvar
                </button>

            </form>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script src="/js/profissionais.js"></script>

</body>

</html>
